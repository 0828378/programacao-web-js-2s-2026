<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Agendamento</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body class="bg-light">

<div class="container mt-5">
<div class="card p-4 shadow">

<h1 class="text-center mb-4">Agendamento</h1>

<form action="/agendamento" method="POST">

<h4>Dados do paciente</h4>

<div class="row">

<div class="col-md-6 mb-3">
<label class="form-label">Nome</label>
<input type="text" name="nome" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Sobrenome</label>
<input type="text" name="sobrenome" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label class="form-label">CPF</label>
<input type="text" name="cpf" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Data de nascimento</label>
<input type="date" name="nascimento" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Telefone</label>
<input type="text" name="telefone" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label class="form-label">CEP</label>
<input type="text" name="cep" class="form-control">
</div>

<div class="col-12 mb-3">
<label class="form-label">Endereço</label>
<input type="text" name="endereco" class="form-control">
</div>

</div>

<h4>Dados da consulta</h4>

<div class="row">

<div class="col-md-6 mb-3">
<label class="form-label">Clínica</label>
<select name="clinica" class="form-select">
<option value="">Selecione</option>
<option>Clínica A</option>
<option>Clínica B</option>
</select>
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Especialidade</label>
<select name="especialidade" class="form-select">
<option value="">Selecione</option>
<option>Cardiologia</option>
<option>Ortopedia</option>
</select>
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Data da consulta</label>
<input type="date" name="data" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Hora da consulta</label>
<input type="time" name="hora" class="form-control">
</div>

<div class="col-12 mb-3">
<label class="form-label">Observação</label>
<textarea name="observacao" class="form-control"></textarea>
</div>

</div>

<button type="submit" class="btn btn-primary w-100">Enviar</button>

</form>

</div>
</div>

</body>
</html>
