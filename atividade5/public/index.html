<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Agendamento</title>

<style>
body {
    font-family: Arial;
    background: #eee;
    padding: 20px;
}

.container {
    max-width: 900px;
    margin: auto;
    background: #f5f5f5;
    padding: 20px;
    border-radius: 10px;
}

h1 {
    text-align: center;
}

.section {
    margin-bottom: 20px;
}

.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
}

.full {
    grid-column: span 2;
}

label {
    font-size: 14px;
    margin-bottom: 5px;
    display: block;
}

input, select, textarea {
    width: 100%;
    padding: 8px;
}

button {
    width: 100%;
    padding: 10px;
    background: #ccc;
    border: none;
    cursor: pointer;
}
</style>

</head>
<body>

<div class="container">
<h1>Agendamento</h1>

<form action="/agendamento" method="POST">

<div class="section">
<h2>Dados do paciente</h2>

<div class="grid">

<div>
<label>Nome</label>
<input type="text" name="nome">
</div>

<div>
<label>Sobrenome</label>
<input type="text" name="sobrenome">
</div>

<div>
<label>CPF</label>
<input type="text" name="cpf">
</div>

<div>
<label>Data de nascimento</label>
<input type="date" name="nascimento">
</div>

<div>
<label>Telefone</label>
<input type="text" name="telefone">
</div>

<div>
<label>CEP</label>
<input type="text" name="cep">
</div>

<div class="full">
<label>Endereço</label>
<input type="text" name="endereco">
</div>

</div>
</div>

<div class="section">
<h2>Dados da consulta</h2>

<div class="grid">

<div>
<label>Clínica</label>
<select name="clinica">
<option value="">Selecione</option>
<option>Clínica A</option>
<option>Clínica B</option>
</select>
</div>

<div>
<label>Especialidade</label>
<select name="especialidade">
<option value="">Selecione</option>
<option>Cardiologia</option>
<option>Ortopedia</option>
</select>
</div>

<div>
<label>Data da consulta</label>
<input type="date" name="data">
</div>

<div>
<label>Hora da consulta</label>
<input type="time" name="hora">
</div>

<div class="full">
<label>Observação</label>
<textarea name="observacao"></textarea>
</div>

</div>
</div>

<button type="submit">Enviar</button>

</form>
</div>

</body>
</html>
