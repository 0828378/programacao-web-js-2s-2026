<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Agendamento</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background-color: #eee;">

<div class="container mt-5">

    <h2 class="text-center mb-4">Agendamento</h2>

    {% if erros %}
    <div class="alert alert-danger">
        <ul class="mb-0">
            {% for erro in erros %}
                <li>{{ erro }}</li>
            {% endfor %}
        </ul>
    </div>
    {% endif %}

    <form action="/agendamento" method="post">

        <!-- DADOS DO PACIENTE -->
        <h4 class="mb-3">Dados do paciente</h4>

        <div class="row mb-3">
            <div class="col-md-6">
                <label>Nome</label>
                <input type="text" name="nome" class="form-control">
            </div>

            <div class="col-md-6">
                <label>Sobrenome</label>
                <input type="text" name="sobrenome" class="form-control">
            </div>
        </div>

        <div class="row mb-3">
            <div class="col-md-6">
                <label>CPF</label>
                <input type="text" name="cpf" class="form-control">
            </div>

            <div class="col-md-6">
                <label>Data de nascimento</label>
                <input type="date" name="nascimento" class="form-control">
            </div>
        </div>

        <div class="row mb-3">
            <div class="col-md-6">
                <label>Telefone</label>
                <input type="text" name="telefone" class="form-control">
            </div>

            <div class="col-md-6">
                <label>CEP</label>
                <input type="text" name="cep" class="form-control">
            </div>
        </div>

        <div class="mb-4">
            <label>Endereço</label>
            <input type="text" name="endereco" class="form-control">
        </div>

        <!-- DADOS DA CONSULTA -->
        <h4 class="mb-3">Dados da consulta</h4>

        <div class="row mb-3">
            <div class="col-md-6">
                <label>Clínica</label>
                <select name="clinica" class="form-control">
                    <option value="">Selecione</option>
                    <option>Clínica A</option>
                    <option>Clínica B</option>
                </select>
            </div>

            <div class="col-md-6">
                <label>Especialidade</label>
                <select name="especialidade" class="form-control">
                    <option value="">Selecione</option>
                    <option>Cardiologia</option>
                    <option>Ortopedia</option>
                </select>
            </div>
        </div>

        <div class="row mb-3">
            <div class="col-md-6">
                <label>Data</label>
                <input type="date" class="form-control" id="data">
            </div>

            <div class="col-md-6">
                <label>Hora</label>
                <input type="time" class="form-control" id="hora">
            </div>
        </div>

        <input type="hidden" name="data_hora" id="data_hora">

        <div class="mb-4">
            <label>Observação</label>
            <textarea name="observacao" class="form-control" rows="3"></textarea>
        </div>

        <button type="submit" class="btn btn-secondary w-100">
            Enviar
        </button>

    </form>

</div>

<script>
    const form = document.querySelector("form");

    form.addEventListener("submit", function() {
        const data = document.getElementById("data").value;
        const hora = document.getElementById("hora").value;

        if (data && hora) {
            document.getElementById("data_hora").value = data + "T" + hora;
        }
    });
</script>

</body>
</html>
